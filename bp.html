<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Monitor Dashboard | Telemedicine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">📊 ระบบติดตามความดันโลหิตที่บ้าน (Home BP)</h1>
                <p class="text-gray-500 mt-1">ค้นหาข้อมูลผู้ป่วยเพื่อดูเทรนด์ความดันและชีพจร</p>
            </div>
            <div class="flex w-full md:w-auto gap-2">
                <input type="text" id="searchInput" placeholder="กรอก ID 13 หลัก หรือ HN..." 
                    class="w-full md:w-80 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                <button onclick="searchPatient()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium shadow-md transition-colors">
                    ค้นหา
                </button>
            </div>
        </div>

        <div id="alertMsg" class="hidden mb-6 p-4 rounded-lg bg-yellow-100 text-yellow-800 border-l-4 border-yellow-500 font-medium">
            กรุณากรอก ID หรือ HN เพื่อค้นหาข้อมูลครับ
        </div>

        <div class="relative h-[500px] w-full border border-gray-100 rounded-lg p-4 bg-gray-50">
            <canvas id="bpChart"></canvas>
        </div>
    </div>

    <script>
        // 1. ตั้งค่า Sheet ID (ของโปรเจกต์ BPtoLine)
        const SHEET_ID = "1caHhz7tKdwnoEu51wAhG8sIqaUpOQBr1ku_jQAqeVzw";
        const SHEET_NAME = "Sheet1";
        
        let allData = [];
        let chartInstance = null;

        // 2. ฟังก์ชันดึงข้อมูลจาก Google Sheets
        async function fetchGoogleSheetData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                const text = await response.text();
                
                // แปลง JSONP เป็น JSON
                const jsonpData = text.substring(text.indexOf("(") + 1, text.lastIndexOf(")"));
                const data = JSON.parse(jsonpData);
                const cols = data.table.cols.map(col => col.label ? col.label.toLowerCase() : '');

                // หาตำแหน่งของแต่ละคอลัมน์
                const idxDate = cols.findIndex(c => c.includes('date') || c.includes('วัน'));
                const idxTime = cols.findIndex(c => c.includes('time') || c.includes('เวลา'));
                const idxID = cols.findIndex(c => c.includes('id') && !c.includes('line'));
                const idxHN = cols.findIndex(c => c.includes('hn'));
                const idxSBP = cols.findIndex(c => c.includes('sbp') || c.includes('sys'));
                const idxDBP = cols.findIndex(c => c.includes('dbp') || c.includes('dia'));
                const idxPulse = cols.findIndex(c => c.includes('pulse') || c.includes('ชีพจร'));

                // จัดรูปแบบข้อมูล
                allData = data.table.rows.map(row => {
                    const getVal = (idx) => row.c[idx] ? row.c[idx].v : null;
                    return {
                        datetime: `${getVal(idxDate)} ${getVal(idxTime)}`,
                        id: getVal(idxID) ? String(getVal(idxID)).trim() : '',
                        hn: (idxHN !== -1 && getVal(idxHN)) ? String(getVal(idxHN)).trim() : '',
                        sbp: Number(getVal(idxSBP)),
                        dbp: Number(getVal(idxDBP)),
                        pulse: Number(getVal(idxPulse))
                    };
                }).filter(d => d.sbp > 0); // กรองเอาเฉพาะแถวที่มีค่าความดัน

                console.log("โหลดข้อมูลสำเร็จ:", allData.length, "รายการ");
            } catch (error) {
                console.error("Error fetching data:", error);
                showAlert("เกิดข้อผิดพลาดในการดึงข้อมูลจาก Google Sheets ครับ", "bg-red-100 text-red-800 border-red-500");
            }
        }

        // 3. ฟังก์ชันค้นหาและกรองข้อมูล
        function searchPatient() {
            const searchValue = document.getElementById('searchInput').value.trim();
            const alertBox = document.getElementById('alertMsg');

            if (searchValue === "") {
                showAlert("กรุณากรอก ID 13 หลัก หรือ HN ก่อนกดค้นหาครับ", "bg-yellow-100 text-yellow-800 border-yellow-500");
                return;
            }

            // *** หัวใจสำคัญ: กรองด้วย ID หรือ HN ***
            const filteredData = allData.filter(d => d.id === searchValue || d.hn === searchValue);

            if (filteredData.length === 0) {
                showAlert(`ไม่พบประวัติความดันของ ID/HN: ${searchValue}`, "bg-red-100 text-red-800 border-red-500");
                if (chartInstance) chartInstance.destroy();
                return;
            }

            alertBox.classList.add('hidden');
            renderChart(filteredData);
        }

        // 4. ฟังก์ชันแสดงผลกราฟ
        function renderChart(data) {
            const ctx = document.getElementById('bpChart').getContext('2d');
            
            // ถ้ามีกราฟเก่าอยู่ให้ลบทำลายทิ้งก่อนสร้างใหม่
            if (chartInstance) {
                chartInstance.destroy();
            }

            const labels = data.map(d => d.datetime);
            const sbpData = data.map(d => d.sbp);
            const dbpData = data.map(d => d.dbp);
            const pulseData = data.map(d => d.pulse);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'ความดันตัวบน (SBP)',
                            data: sbpData,
                            borderColor: '#3b82f6', // สีฟ้า
                            backgroundColor: '#3b82f6',
                            borderWidth: 2,
                            pointRadius: 5,
                            yAxisID: 'y'
                        },
                        {
                            label: 'ความดันตัวล่าง (DBP)',
                            data: dbpData,
                            borderColor: '#eab308', // สีเหลือง
                            backgroundColor: '#eab308',
                            borderWidth: 2,
                            pointRadius: 4,
                            yAxisID: 'y'
                        },
                        {
                            label: 'ชีพจร (Pulse)',
                            data: pulseData,
                            borderColor: '#9ca3af', // สีเทา
                            backgroundColor: '#9ca3af',
                            borderDash: [5, 5], // เส้นประ
                            borderWidth: 2,
                            pointRadius: 3,
                            yAxisID: 'y1' // แยกแกน Y ไปฝั่งขวา
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', titleFont: { size: 14 }, bodyFont: { size: 14 } },
                        annotation: {
                            annotations: {
                                // เส้นอ้างอิง SBP 120 (สีม่วง)
                                lineSBP: {
                                    type: 'line',
                                    yMin: 120, yMax: 120,
                                    borderColor: '#a855f7', borderWidth: 2, borderDash: [4, 4],
                                    label: { display: true, content: 'เป้าหมาย SBP 120', position: 'end', backgroundColor: 'rgba(168, 85, 247, 0.8)' }
                                },
                                // เส้นอ้างอิง DBP 80 (สีเขียว)
                                lineDBP: {
                                    type: 'line',
                                    yMin: 80, yMax: 80,
                                    borderColor: '#22c55e', borderWidth: 2, borderDash: [4, 4],
                                    label: { display: true, content: 'เป้าหมาย DBP 80', position: 'end', backgroundColor: 'rgba(34, 197, 94, 0.8)' }
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: {
                            type: 'linear', display: true, position: 'left',
                            title: { display: true, text: 'ความดัน (mmHg)' },
                            min: 40, max: 200
                        },
                        y1: {
                            type: 'linear', display: true, position: 'right',
                            title: { display: true, text: 'ชีพจร (bpm)' },
                            min: 40, max: 150,
                            grid: { drawOnChartArea: false } // ไม่ให้เส้นกริดทับกัน
                        }
                    }
                }
            });
        }

        // ฟังก์ชันช่วยแสดง Alert
        function showAlert(msg, classes) {
            const alertBox = document.getElementById('alertMsg');
            alertBox.className = `mb-6 p-4 rounded-lg font-medium border-l-4 ${classes}`;
            alertBox.innerText = msg;
            alertBox.classList.remove('hidden');
        }

        // รันฟังก์ชันดึงข้อมูลทันทีที่เปิดหน้าเว็บ
        window.onload = fetchGoogleSheetData;
    </script>
</body>
</html>
